name: Ring change
description: Request moving a technology to another ring
title: "[Radar] Move <technology> to <ring>"
labels: [radar, ring-change]
body:
  - type: input
    id: technology
    attributes:
      label: Technology
      placeholder: radar/<layer>/<slug>
    validations:
      required: true
  - type: dropdown
    id: target
    attributes:
      label: Target ring
      options: [adopt, trial, assess, hold]
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: |
        Adopt needs a production use on a client project. Hold needs a reason and an alternative.
        See GOVERNANCE.md for the rules per transition.
    validations:
      required: true
